# Alembic configuration for KYROX Core.
# Migrations are not initialized yet; this file prepares PostgreSQL-ready setup.

[alembic]
script_location = backend/alembic
prepend_sys_path = .
version_path_separator = os

# Override at runtime via env.py using app.core.config.settings.DATABASE_URL
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/kyrox_core

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
